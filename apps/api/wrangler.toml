name = "orbit-api"
main = "src/index.ts"
compatibility_date = "2026-03-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = false

[vars]
ENVIRONMENT = "production"

# ── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "orbit-db"
database_id = "abdc8803-f3ea-4f60-a5fa-dbcae58f4c18"
migrations_dir = "migrations"

# ── KV Namespaces ─────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id = "94e21f34fd9841e2a179f097be10bfee"

# ── Development overrides ──────────────────────────────────────────────────────
[env.development]
[env.development.vars]
ENVIRONMENT = "development"
